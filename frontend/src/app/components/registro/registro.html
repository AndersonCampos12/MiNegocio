<div class="min-h-screen bg-gray-50 flex flex-col items-center justify-center p-6 sm:p-12">

    <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-xl border border-gray-100">

        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-blue-100 mb-4">
                <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                    xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                </svg>
            </div>
            <h2 class="text-3xl font-bold text-gray-900">Crea tu cuenta</h2>
            <p class="text-gray-500 mt-2 text-sm">Únete para empezar a comprar fácil y rápido</p>
        </div>

        <div *ngIf="errorMsg" class="mb-6 bg-red-50 border-l-4 border-red-500 p-4 rounded-md flex items-center">
            <svg class="h-5 w-5 text-red-500 mr-2 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <span class="text-sm text-red-700">{{ errorMsg }}</span>
        </div>

        <form class="space-y-5" (ngSubmit)="ejecutarRegistro()">

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Nombre Completo</label>
                <input type="text" [(ngModel)]="nombre" name="nombre" required autocomplete="name"
                    placeholder="Ej. Juan Pérez"
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-300 text-gray-900 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Correo Electrónico</label>
                <input type="email" [(ngModel)]="email" name="email" required autocomplete="email"
                    placeholder="correo@ejemplo.com"
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-300 text-gray-900 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
                <input type="password" [(ngModel)]="password" name="password" required autocomplete="new-password"
                    placeholder="Mínimo 6 caracteres"
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-300 text-gray-900 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm">
            </div>

            <div class="pt-2">
                <label class="flex items-start gap-3 cursor-pointer">
                    <input type="checkbox" [(ngModel)]="aceptaTerminos" name="aceptaTerminos" required
                        class="mt-1 w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded focus:ring-blue-500 focus:ring-2 cursor-pointer">
                    <span class="text-xs text-gray-600 leading-tight">Al registrarte, aceptas nuestras <a href="#"
                            class="text-blue-600 hover:underline">políticas de privacidad</a> y términos de
                        servicio.</span>
                </label>
            </div>

            <button type="submit" [disabled]="cargando"
                class="w-full mt-4 bg-blue-600 text-white font-semibold py-3.5 rounded-lg text-sm hover:bg-blue-700 focus:ring-4 focus:ring-blue-300 transition-all flex justify-center items-center disabled:opacity-70 disabled:cursor-not-allowed shadow-md shadow-blue-500/30">
                <ng-container *ngIf="cargando; else noCargando">
                    <svg class="animate-spin h-5 w-5 text-white mr-2" xmlns="http://www.w3.org/2000/svg" fill="none"
                        viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                        </circle>
                        <path class="opacity-75" fill="currentColor"
                            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                        </path>
                    </svg>
                    CREANDO CUENTA...
                </ng-container>
                <ng-template #noCargando>
                    CREAR MI CUENTA
                </ng-template>
            </button>

        </form>

        <div class="mt-8 mb-6 relative flex items-center justify-center">
            <div class="border-t border-gray-200 w-full"></div>
            <span class="bg-white px-4 text-xs font-medium text-gray-500 absolute uppercase tracking-wider">O usa</span>
        </div>

        <div class="w-full flex justify-center">
            <div id="googleBtn" class="w-full flex justify-center"></div>
        </div>

        <div class="text-center mt-8 text-sm text-gray-600">
            ¿Ya tienes una cuenta?
            <a [routerLink]="['/tienda', slugTienda, 'login']"
                class="text-blue-600 font-semibold hover:text-blue-800 transition-colors cursor-pointer">
                Inicia sesión aquí
            </a>
        </div>

    </div>
</div>
