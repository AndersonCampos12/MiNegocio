<div class="min-h-screen bg-gray-50 flex">

    <div
        class="hidden lg:flex lg:w-1/2 bg-blue-600 flex-col justify-center items-center p-12 text-white relative overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-br from-blue-700 to-blue-500 opacity-90 z-0"></div>

        <div class="z-10 text-center">
            <svg class="mb-8 mx-auto" width="60" height="60" viewBox="0 0 60 40" fill="none"
                xmlns="http://www.w3.org/2000/svg">
                <path d="M5 15 Q 12.5 5, 20 15 T 35 15 T 50 15 T 65 15" stroke="white" stroke-width="4" fill="none"
                    stroke-linecap="round" />
                <path d="M5 25 Q 12.5 15, 20 25 T 35 25 T 50 25 T 65 25" stroke="white" stroke-width="4" fill="none"
                    stroke-linecap="round" />
            </svg>
            <h1 class="text-4xl font-bold mb-4">Bienvenido a MiNegocio</h1>
            <p class="text-blue-100 text-lg font-light max-w-md mx-auto">
                Revisa tu caja de venta, tu inventario, reportes y alertas. Todo el poder de tu negocio en la palma de
                tu mano.
            </p>
        </div>
    </div>

    <div class="w-full lg:w-1/2 flex items-center justify-center p-8">
        <div class="w-full max-w-md bg-white p-8 rounded-xl shadow-lg border border-gray-100">

            <div class="text-center mb-8 lg:hidden">
                <h2 class="text-2xl font-bold text-gray-800">MiNegocio</h2>
            </div>

            <h3 class="text-2xl font-semibold text-gray-800 mb-6 text-center">Iniciar Sesión</h3>

            @if (errorMsg) {
            <div class="mb-6 bg-red-50 border-l-4 border-red-500 p-4 rounded-md flex items-center">
                <svg class="h-5 w-5 text-red-500 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <span class="text-sm text-red-700">{{ errorMsg }}</span>
            </div>
            }

            <form class="space-y-5" (ngSubmit)="ejecutarLogin()">

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Correo Electrónico</label>
                    <input type="email" [(ngModel)]="email" name="email" required autocomplete="username"
                        class="w-full px-4 py-3 bg-gray-50 border border-gray-300 text-gray-900 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
                    <<input type="password" [(ngModel)]="password" name="password" required
                        autocomplete="current-password"
                        class="w-full px-4 py-3 bg-gray-50 border border-gray-300 text-gray-900 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm">
                </div>

                <div class="flex items-center justify-between mt-2">
                    <a href="#"
                        class="text-sm text-blue-600 hover:text-blue-800 transition-colors font-medium">¿Olvidaste tu
                        contraseña?</a>
                </div>

                <button type="submit" [disabled]="isLoading"
                    class="w-full bg-blue-600 text-white font-semibold py-3 rounded-lg text-sm hover:bg-blue-700 focus:ring-4 focus:ring-blue-300 transition-all flex justify-center items-center">
                    @if (isLoading) {
                    <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none"
                        viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                        </circle>
                        <path class="opacity-75" fill="currentColor"
                            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                        </path>
                    </svg>
                    } @else {
                    ENTRAR
                    }
                </button>
            </form>

            <div class="mt-6 mb-6 relative flex items-center justify-center">
                <div class="border-t border-gray-300 w-full"></div>
                <span class="bg-white px-3 text-sm text-gray-500 absolute">O continúa con</span>
            </div>

            <div class="w-full flex justify-center">
                <div id="googleBtn" class="w-full flex justify-center"></div>
            </div>

            <div class="text-center mt-8 text-sm text-gray-600">
                ¿No tienes una cuenta?
                <a routerLink="/admin/registro"
                    class="text-blue-600 font-semibold hover:text-blue-800 transition-colors cursor-pointer">
                    Crea una ahora
                </a>
            </div>

        </div>
    </div>
</div>
