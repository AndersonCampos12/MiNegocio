<div class="min-h-screen bg-fondoOscuro flex flex-col items-center justify-center relative px-8">

    <div class="absolute inset-0 pointer-events-none opacity-20 overflow-hidden">
        <div class="absolute top-1/4 -left-10 w-[150%] h-[1px] bg-white rotate-[-15deg]"></div>
        <div class="absolute bottom-1/4 -left-10 w-[150%] h-[1px] bg-white rotate-[-15deg]"></div>
    </div>

    <svg class="mb-10 z-10" width="40" height="30" viewBox="0 0 60 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M5 15 Q 12.5 5, 20 15 T 35 15 T 50 15 T 65 15" stroke="white" stroke-width="3" fill="none"
            stroke-linecap="round" />
        <path d="M5 25 Q 12.5 15, 20 25 T 35 25 T 50 25 T 65 25" stroke="white" stroke-width="3" fill="none"
            stroke-linecap="round" />
    </svg>

    <div class="text-center text-gray-300 font-light mb-12 space-y-4 z-10">
        <p>Revisa tu caja de venta</p>
        <p>tu inventario, reportes y alertas</p>
        <p>al poder de tu mano</p>
    </div>

    @if (errorMsg) {
    <div class="w-full bg-red-900/50 border border-red-500 p-3 rounded text-xs text-center text-red-200 z-10">
        {{ errorMsg }}
    </div>
    }

    <div class="w-full max-w-sm flex flex-col gap-4 z-10">
        <input type="email" [(ngModel)]="email" placeholder="Correo electrónico"
            class="w-full p-3 bg-white text-black rounded-sm outline-none text-sm">
        <input type="password" [(ngModel)]="password" placeholder="Contraseña"
            class="w-full p-3 bg-white text-black rounded-sm outline-none text-sm">

        <button (click)="ejecutarLogin()"
            class="w-full bg-white text-black font-semibold py-4 rounded-sm text-sm tracking-widest hover:bg-gray-200 transition-colors">
            INICIAR SESIÓN
        </button>

        <div class="relative w-full mt-4">

            <div class="relative w-full mt-4">

                <button type="button"
                    class="w-full bg-transparent border border-white text-white font-semibold py-3 rounded-sm text-sm tracking-widest flex items-center justify-center gap-2 hover:bg-white hover:text-black transition-colors">
                    ENTRAR CON GOOGLE
                </button>

                <div
                    class="absolute inset-0 z-10 opacity-0 overflow-hidden flex items-center justify-center cursor-pointer">
                    <div id="googleBtn" class="w-full h-full transform scale-150 [&>div]:w-full [&>div]:h-full"></div>
                </div>
            </div>
        </div>

        <div class="text-center mt-4">
            <a href="#" class="text-gray-400 text-sm hover:text-white transition-colors">¿olvidaste tu contraseña?</a>
        </div>

        <div class="text-center mt-2" routerLink="/registro">
            <a href="javascript:void(0)"
                class="text-turquesa text-sm font-semibold hover:text-white transition-colors cursor-pointer">
                CREAR CUENTA
            </a>
        </div>
    </div>
</div>
