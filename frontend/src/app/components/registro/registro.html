<div class="min-h-screen bg-gray-50 flex">

    <div
        class="hidden lg:flex lg:w-1/2 bg-blue-600 flex-col justify-center items-center p-12 text-white relative overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-br from-blue-700 to-blue-500 opacity-90 z-0"></div>

        <div class="z-10 text-center">
            <svg class="mb-8 mx-auto" width="60" height="60" viewBox="0 0 60 40" fill="none"
                xmlns="http://www.w3.org/2000/svg">
                <path d="M5 15 Q 12.5 5, 20 15 T 35 15 T 50 15 T 65 15" stroke="white" stroke-width="4" fill="none"
                    stroke-linecap="round" />
                <path d="M5 25 Q 12.5 15, 20 25 T 35 25 T 50 25 T 65 25" stroke="white" stroke-width="4" fill="none"
                    stroke-linecap="round" />
            </svg>
            <h1 class="text-4xl font-bold mb-4">Únete a MiNegocio</h1>
            <p class="text-blue-100 text-lg font-light max-w-md mx-auto">
                Crea tu cuenta administrativa y toma el control total de tus ventas, inventario y reportes en minutos.
            </p>
        </div>
    </div>

    <div class="w-full lg:w-1/2 flex items-center justify-center p-6 sm:p-8 overflow-y-auto">
        <div class="w-full max-w-md bg-white p-8 rounded-xl shadow-lg border border-gray-100 my-8">

            <div class="text-center mb-6 lg:hidden">
                <h2 class="text-2xl font-bold text-gray-800">MiNegocio</h2>
            </div>

            <h3 class="text-2xl font-semibold text-gray-800 mb-2 text-center">Crear Cuenta Administrativa</h3>
            <p class="text-gray-500 text-sm text-center mb-6">Completa tus datos para registrar tu empresa</p>

            <div *ngIf="errorMsg" class="mb-6 bg-red-50 border-l-4 border-red-500 p-4 rounded-md flex items-center">
                <svg class="h-5 w-5 text-red-500 mr-2 flex-shrink-0" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <span class="text-sm text-red-700">{{ errorMsg }}</span>
            </div>

            <form class="space-y-4" (ngSubmit)="ejecutarRegistro()">

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nombre Completo del
                        Administrador</label>
                    <input type="text" [(ngModel)]="adminNombre" name="adminNombre" required autocomplete="name"
                        placeholder="Ej. Juan Pérez"
                        class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 text-gray-900 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Correo Electrónico</label>
                    <input type="email" [(ngModel)]="email" name="email" required autocomplete="email"
                        placeholder="correo@empresa.com"
                        class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 text-gray-900 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña de Acceso</label>
                    <input type="password" [(ngModel)]="password" name="password" required autocomplete="new-password"
                        placeholder="Mínimo 6 caracteres"
                        class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 text-gray-900 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm">
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Teléfono</label>
                        <input type="tel" [(ngModel)]="telefono" name="telefono" autocomplete="tel" placeholder="099..."
                            class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 text-gray-900 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Nombre de la Empresa</label>
                        <input type="text" [(ngModel)]="negocioNombre" name="negocioNombre" required
                            autocomplete="organization" placeholder="Importaciones RS"
                            class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 text-gray-900 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm">
                    </div>
                </div>

                <div class="pt-2">
                    <label class="flex items-start gap-3 cursor-pointer">
                        <input type="checkbox" [(ngModel)]="aceptaTerminos" name="aceptaTerminos" required
                            class="mt-1 w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded focus:ring-blue-500 focus:ring-2 cursor-pointer">
                        <span class="text-xs text-gray-600">Acepto los <a href="#"
                                class="text-blue-600 hover:underline">términos y condiciones</a> de uso administrativo y
                            la política de privacidad.</span>
                    </label>
                </div>

                <button type="submit" [disabled]="cargando"
                    class="w-full mt-4 bg-blue-600 text-white font-semibold py-3 rounded-lg text-sm hover:bg-blue-700 focus:ring-4 focus:ring-blue-300 transition-all flex justify-center items-center disabled:opacity-70 disabled:cursor-not-allowed">
                    <ng-container *ngIf="cargando; else noCargando">
                        <svg class="animate-spin h-5 w-5 text-white mr-2" xmlns="http://www.w3.org/2000/svg" fill="none"
                            viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                            </circle>
                            <path class="opacity-75" fill="currentColor"
                                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                            </path>
                        </svg>
                        GUARDANDO...
                    </ng-container>
                    <ng-template #noCargando>
                        REGISTRAR Y CONTINUAR
                    </ng-template>
                </button>

            </form>

            <div class="text-center mt-8 text-sm text-gray-600">
                ¿Ya tienes una cuenta?
                <a routerLink="/login"
                    class="text-blue-600 font-semibold hover:text-blue-800 transition-colors cursor-pointer">
                    Inicia sesión
                </a>
            </div>

        </div>
    </div>
</div>
